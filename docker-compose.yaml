version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: agentpipe_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ###
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentpipe_net

  api:
    build: .
    container_name: agentpipe_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agentpipe_net

  mcp:
    build: .
    container_name: agentpipe_mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agentpipe_net
    stdin_open: true   # MCP uses stdio transport
    tty: false
    command: ["python", "mcp_server.py"]

volumes:
  postgres_data:

networks:
  agentpipe_net:
    driver: bridge
